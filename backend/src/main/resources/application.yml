server:
  port: 8080

spring:
  application:
    name: ecommerce-backend
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    lettuce:
      pool:
        max-active: 100
        max-idle: 100
        max-wait: 6000
        min-idle: 50
    port: 6379
    timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1小时
      cache-null-values: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.ec: DEBUG
    org.springframework.data.redis: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.cache: DEBUG

# 自定义配置
app:
  redis:
    stock-lock-timeout: 30
    order-cache-timeout: 24
    product-cache-timeout: 1
  cache:
    products-ttl: 1800 # 30分钟
    orders-ttl: 86400  # 24小时 